# API cache safety defaults (payments)

# Ensure we never cache responses at the edge.
proxy_cache off;
proxy_no_cache 1;
proxy_cache_bypass 1;

# Hide potentially unsafe cache headers coming back from upstreams.
proxy_hide_header Cache-Control;
proxy_hide_header Pragma;
proxy_hide_header ETag;
proxy_hide_header Last-Modified;

# Prevent intermediary/proxy caches from storing payment data.
add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;

# Avoid caching in the browser as well.
add_header Pragma "no-cache" always;
