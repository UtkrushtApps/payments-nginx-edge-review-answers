# Payments-facing edge security headers (HTTP for local demo)

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;

# Clickjacking and basic hardening.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Since this edge is HTTP-only in the local demo, HSTS is optional.
# Keep it off by default for correctness; uncomment if you enable TLS.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Content security for the static landing page.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'" always;
