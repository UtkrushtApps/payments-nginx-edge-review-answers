# Extra API request hardening: payments-facing defaults.

# Normalize common edge cases and reduce cache/variant confusion.
proxy_set_header Accept-Encoding "";

# Avoid sending hop-by-hop headers.
proxy_set_header Proxy "";

# If upstream attempts to set redirects, do not follow.
proxy_redirect off;

# Add helpful debug headers from the edge.
# (Actual values are attached after proxying via $upstream_* variables.)
add_header X-Edge-Edge-Tier "payments-nginx" always;
