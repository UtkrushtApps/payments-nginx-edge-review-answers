# Unified access log format with edge vs upstream latency decomposition.
# This makes it obvious whether the edge or the selected upstream is slow.

log_format edge_main
    'edge_client=$remote_addr '
    'time=$time_local '
    'method=$request_method host=$host '
    'uri=$uri '
    'status=$status bytes=$body_bytes_sent '
    'xff="$http_x_forwarded_for" '
    'ua="$http_user_agent" '
    'referer="$http_referer" '
    'upstream="$upstream_addr" '
    'upstream_status="$upstream_status" '
    'edge_request_time=$request_time '
    'upstream_connect_time=$upstream_connect_time '
    'upstream_response_time=$upstream_response_time '
    'request="$request"';
