# Edge tier for a payments API
# - Resilient upstream selection (timeouts, passive health, controlled retries)
# - Payments-safe caching and hardened proxy headers
# - Clear access logging with upstream selection + edge vs upstream latency
# - Basic abuse controls (rate/connections)
# - Efficient static asset caching that does not interfere with API proxying

upstream payments_api {
    # Shared state for passive health tracking
    zone payments_api 64k;

    # Keepalive improves resilience during upstream churn by avoiding reconnect storms.
    keepalive 32;

    # Least-connections helps smooth uneven latency.
    least_conn;

    # Passive health: remove endpoints after repeated failures.
    server payments-api-a:80 max_fails=3 fail_timeout=10s;
    server payments-api-b:80 max_fails=3 fail_timeout=10s;
    server payments-api-c:80 max_fails=3 fail_timeout=10s;
}

server {
    listen 80 default_server;
    server_name api.payments.local localhost;

    # Single, clear access log for this server.
    access_log /var/log/nginx/payments_access.log edge_main;

    include /etc/nginx/snippets/security-headers.conf;

    # Default: do not cache anything at the edge for the API.
    include /etc/nginx/snippets/api-policy.conf;

    # Abuse controls: tighter for API, exempt health.
    limit_req zone=req_limit burst=40 nodelay;
    limit_conn conn_limit 20;

    # Minimal hardening for common scanner behavior.
    location ~* /(?:\.\w+|\.\w+/$) {
        deny all;
        return 404;
    }

    location /healthz {
        access_log off;
        limit_req off;
        limit_conn 0;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        access_log off;
    }

    # Static assets: efficient caching and separation from API proxying.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;

        access_log off;
        include /etc/nginx/snippets/static-policy.conf;

        # Avoid content sniffing; safety for JS/CSS served with correct MIME types.
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Payments-changing endpoints: conservative retry policy.
    # These requests are not treated as idempotent in this edge tier.
    location = /v1/charges {
        include /etc/nginx/snippets/shared.conf;

        # Requests to payment-changing endpoints must not be retried automatically.
        proxy_next_upstream off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 45s;

        # Harden caching and headers.
        include /etc/nginx/snippets/api-rewrite-headers.conf;

        proxy_pass http://payments_api;

        # Make upstream handling visible to operators.
        add_header X-Edge-Upstream-Addr $upstream_addr always;
        add_header X-Edge-Upstream-Status $upstream_status always;
        add_header X-Edge-Request-Time $request_time always;
        add_header X-Edge-Upstream-Response-Time $upstream_response_time always;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location = /v1/refunds {
        include /etc/nginx/snippets/shared.conf;
        proxy_next_upstream off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 45s;

        include /etc/nginx/snippets/api-rewrite-headers.conf;

        proxy_pass http://payments_api;

        add_header X-Edge-Upstream-Addr $upstream_addr always;
        add_header X-Edge-Upstream-Status $upstream_status always;
        add_header X-Edge-Request-Time $request_time always;
        add_header X-Edge-Upstream-Response-Time $upstream_response_time always;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Default API proxying: resilient behavior with controlled retries.
    # Retries are enabled only for this generic location.
    # (For charges/refunds we intentionally disable retries above.)
    location /v1/ {
        include /etc/nginx/snippets/shared.conf;

        # If upstream is unhealthy or the response fails, try a different replica.
        proxy_connect_timeout 3s;
        proxy_send_timeout 20s;
        proxy_read_timeout 35s;

        # Network and upstream errors trigger retries.
        # Conservative: limit the number of upstreams tried and cap overall time.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        # When failing, return fast with context.
        proxy_intercept_errors off;

        # Buffering helps decouple upstream slowness from client write behavior.
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 64k;

        include /etc/nginx/snippets/api-rewrite-headers.conf;

        proxy_pass http://payments_api;

        add_header X-Edge-Upstream-Addr $upstream_addr always;
        add_header X-Edge-Upstream-Status $upstream_status always;
        add_header X-Edge-Request-Time $request_time always;
        add_header X-Edge-Upstream-Response-Time $upstream_response_time always;

        # Payments safety: never cache responses.
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
