user nginx;
worker_processes auto;

env NGINX_ENTRYPOINT_QUIET;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Abuse controls (payments-facing internet edge defaults)
    # - Keyed by client IP; safe enough for local demo.
    # - Conservative defaults to mitigate accidental overload.
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    include /etc/nginx/snippets/logging.conf;

    # Disable global access log to avoid duplication; per-server logging is enabled in site.conf.
    access_log off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    client_body_timeout 60s;
    client_header_timeout 60s;

    client_max_body_size 10m;

    server_tokens off;

    gzip off;

    include /etc/nginx/conf.d/*.conf;
}
